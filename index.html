<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura Matemática - 6to Año</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #87CEEB; 
            background-image: radial-gradient(#ffffff 2px, transparent 2px);
            background-size: 30px 30px;
        }
        h1, h2, .game-font { font-family: 'Fredoka', sans-serif; }
        
        .btn-game { box-shadow: 0 6px 0 rgba(0,0,0,0.2); transition: all 0.1s; }
        .btn-game:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.2); }
        .option-btn { transition: all 0.2s ease-in-out; }
        .option-btn:disabled { cursor: not-allowed; }
        
        .bounce-hero { animation: bounceHero 2s infinite; }
        @keyframes bounceHero { 0%, 100% { transform: translateY(-10px); } 50% { transform: translateY(10px); } }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }

        .progress-dot { width: 15px; height: 15px; border-radius: 50%; background-color: white; border: 3px solid rgba(255,255,255,0.5); transition: all 0.3s; }
        .progress-dot.active { background-color: #FBBF24; border-color: #FFF; transform: scale(1.3); box-shadow: 0 0 10px #FBBF24;}
        .progress-dot.done { background-color: #4ADE80; border-color: #FFF; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Contenedor Principal -->
    <div class="max-w-2xl w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden border-8 border-white">
        
        <!-- PANTALLA DE INICIO -->
        <div id="start-screen" class="p-8 text-center bg-gradient-to-b from-indigo-500 to-purple-600 text-white h-full rounded-[1.5rem]">
            <div class="text-8xl mb-4 bounce-hero">🎮🧑‍🚀</div>
            <h1 class="text-5xl md:text-6xl font-black mb-2 drop-shadow-lg text-yellow-300 tracking-wide leading-tight">Misión<br>Matemática</h1>
            <p class="text-xl md:text-2xl font-bold mb-6 text-purple-100">¡Con niveles aleatorios infinitos!</p>
            
            <div class="bg-white/20 rounded-2xl p-4 mb-8 text-left inline-block">
                <p class="font-bold text-lg mb-2"><i class="fas fa-random text-yellow-300"></i> Sistema Anti-Trampas:</p>
                <ul class="text-sm space-y-2 font-semibold">
                    <li>🔄 Los números cambian en cada partida.</li>
                    <li>🔀 Las respuestas correctas cambian de lugar.</li>
                    <li>🧠 ¡Tendrás que calcular de verdad!</li>
                </ul>
            </div><br>

            <button onclick="startQuiz()" class="btn-game bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-black py-4 px-10 rounded-full text-2xl w-full md:w-auto uppercase tracking-wider">
                ¡INICIAR PARTIDA! <i class="fas fa-gamepad ml-2"></i>
            </button>
        </div>

        <!-- PANTALLA DEL QUIZ -->
        <div id="quiz-screen" class="hidden flex-col h-full">
            <div id="level-header" class="bg-indigo-600 p-6 text-white transition-colors duration-500 rounded-t-xl">
                <div class="flex justify-between items-center mb-2">
                    <div class="bg-black/20 px-4 py-1 rounded-full font-black tracking-wider text-sm">MUNDO <span id="current-q-num">1</span>/9</div>
                    <div class="text-xl font-black bg-yellow-400 text-yellow-900 px-4 py-1 rounded-full shadow-inner border-2 border-yellow-500">⭐ <span id="score-display">0</span></div>
                </div>
                <div class="text-center my-4">
                    <div id="topic-icon" class="text-5xl mb-2 drop-shadow-md">🪄</div>
                    <h2 id="topic-title" class="game-font text-3xl md:text-4xl font-black text-white drop-shadow-md leading-tight">Título</h2>
                </div>
                <div class="flex justify-between items-center mt-6 px-2" id="progress-dots-container"></div>
            </div>

            <div class="p-6 md:p-8 flex-grow bg-slate-50 relative">
                <div id="question-card" class="bg-white p-6 rounded-2xl shadow-lg border-4 border-slate-100 mb-6 relative z-10">
                    <h3 id="question-text" class="text-xl md:text-2xl font-bold text-slate-800">¿Pregunta?</h3>
                </div>
                <div id="options-container" class="space-y-4"></div>
                <div id="feedback-container" class="mt-6 hidden p-5 rounded-2xl text-center font-bold text-lg border-4 shadow-sm animate__animated"></div>
            </div>

            <div class="p-4 bg-white border-t-4 border-slate-100 flex justify-center pb-6">
                <button id="next-btn" onclick="nextQuestion()" class="hidden btn-game w-full md:w-2/3 bg-blue-500 hover:bg-blue-400 text-white font-black py-4 px-8 rounded-full text-xl tracking-wider uppercase">
                    Siguiente Nivel <i class="fas fa-forward ml-2"></i>
                </button>
            </div>
        </div>

        <!-- PANTALLA DE RESULTADOS -->
        <div id="result-screen" class="hidden p-8 text-center bg-gradient-to-b from-yellow-300 to-orange-400 h-full rounded-[1.5rem] border-8 border-white">
            <div id="result-icon" class="text-8xl mb-4 drop-shadow-lg bounce-hero">🏆</div>
            <h2 id="result-title" class="game-font text-5xl font-black text-orange-900 mb-2 drop-shadow-md uppercase">¡MISIÓN<br>CUMPLIDA!</h2>
            <div class="bg-white/30 rounded-3xl p-6 my-8 shadow-inner border-4 border-white/40">
                <p class="text-xl text-orange-900 font-bold mb-2">Puntuación Final</p>
                <div class="text-7xl font-black text-white drop-shadow-lg"><span id="final-score">0</span><span class="text-4xl">/9</span></div>
            </div>
            <p id="result-message" class="text-2xl text-orange-900 mb-8 font-black bg-white/50 py-3 px-6 rounded-2xl"></p>
            <button onclick="resetQuiz()" class="btn-game bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 px-8 rounded-full text-xl shadow-xl w-full uppercase tracking-wider">
                <i class="fas fa-redo mr-2"></i> Jugar nueva partida
            </button>
        </div>
    </div>

    <!-- AUDIO EFFECTS -->
    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        // ==========================================
        // SISTEMA DE GENERACIÓN DINÁMICA (ANTI-TRAMPAS)
        // ==========================================
        
        // Utilidades matemáticas
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        
        // Mezclador de opciones (asegura que la correcta esté en diferente lugar cada vez)
        function shuffleOptions(correctAnswer, distractors) {
            let opts = [correctAnswer, ...distractors];
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { options: opts, correctIndex: opts.indexOf(correctAnswer) };
        }

        let questions = []; // Se llenará dinámicamente cada vez que se inicie

        function generateQuestions() {
            questions = []; // Limpiar

            // 1. Propiedades de Multiplicación
            const props = [
                { nombre: "Propiedad Conmutativa", formula: (a,b,c) => `${a} x ${b} = ${b} x ${a}`, exp: "El orden de los números no altera el resultado." },
                { nombre: "Propiedad Asociativa", formula: (a,b,c) => `(${a} x ${b}) x ${c} = ${a} x (${b} x ${c})`, exp: "No importa cómo agrupes entre paréntesis, el resultado es el mismo." },
                { nombre: "Propiedad Distributiva", formula: (a,b,c) => `${a} x (${b} + ${c}) = (${a} x ${b}) + (${a} x ${c})`, exp: "El número de afuera se reparte y multiplica a cada uno de los de adentro." }
            ];
            let p = props[rand(0,2)];
            let a1 = rand(2,7), b1 = rand(2,7), c1 = rand(2,7);
            let opt1 = shuffleOptions(p.nombre, props.filter(x => x.nombre !== p.nombre).map(x=>x.nombre).concat(["Propiedad Clausurativa"]));
            
            questions.push({
                topic: "Multiplicación Mágica", icon: "🪄", color: "from-blue-500 to-indigo-600",
                question: `¡Un hechizo! ¿Qué propiedad se está usando aquí?\n\n ${p.formula(a1,b1,c1)}`,
                options: opt1.options, correct: opt1.correctIndex, explanation: `¡Magia pura! Es la ${p.nombre}. ${p.exp}`
            });

            // 2. División
            let div_d = rand(3, 9); // divisor
            let div_c = rand(4, 12); // cociente
            let div_r = rand(1, div_d - 1); // residuo
            let dividendo = (div_d * div_c) + div_r;
            let opt2 = shuffleOptions(`Teníamos ${dividendo}`, [`Teníamos ${dividendo + div_r}`, `Teníamos ${dividendo - 2}`, `Teníamos ${div_d * div_c}`]);
            
            questions.push({
                topic: "Misterio de la División", icon: "🕵️‍♂️", color: "from-emerald-500 to-teal-600",
                question: `Resuelve el misterio: Si repartimos en ${div_d} partes, a cada uno le tocan ${div_c} y sobran ${div_r}. ¿Cuánto teníamos al principio (Dividendo)?`,
                options: opt2.options, correct: opt2.correctIndex, explanation: `Fórmula secreta: (Divisor x Cociente) + Residuo. Es decir: (${div_d} x ${div_c}) + ${div_r} = ${dividendo}.`
            });

            // 3. Semirrecta
            let den3 = rand(4, 9);
            let num3 = rand(1, den3 - 1);
            let opt3 = shuffleOptions(`${num3}/${den3}`, [`${den3}/${num3}`, `${num3+1}/${den3}`, `${num3}/${den3+1}`]);

            questions.push({
                topic: "Saltos de Canguro", icon: "🦘", color: "from-orange-500 to-red-500",
                question: `En una pista, divides el camino en ${den3} partes iguales. Si das ${num3} saltos de canguro desde el inicio, ¿en qué fracción aterrizas?`,
                options: opt3.options, correct: opt3.correctIndex, explanation: `¡Boing! Las partes en que se divide es el número de abajo (${den3}) y los saltos que das es el de arriba (${num3}).`
            });

            // 4. Orden Fracciones
            const fracs = [{text:"1/2", val:0.5}, {text:"1/3", val:0.33}, {text:"1/4", val:0.25}, {text:"3/4", val:0.75}, {text:"2/5", val:0.4}];
            let f1 = fracs[rand(0, fracs.length-1)];
            let f2;
            do { f2 = fracs[rand(0, fracs.length-1)]; } while (f1 === f2);
            let mayor = f1.val > f2.val ? f1 : f2;
            let menor = f1.val < f2.val ? f1 : f2;
            let opt4 = shuffleOptions(`El monstruo ${mayor.text}`, [`El monstruo ${menor.text}`, "Son iguales", "No se puede saber"]);

            questions.push({
                topic: "Batalla de Fracciones", icon: "⚔️", color: "from-purple-500 to-pink-600",
                question: `¡Duelo de titanes! ¿Cuál de estas fracciones es el monstruo MÁS GRANDE: ${f1.text} o ${f2.text}?`,
                options: opt4.options, correct: opt4.correctIndex, explanation: `¡Ganó ${mayor.text}! Si multiplicas en cruz, descubres cuál vale más.`
            });

            // 5. Primos
            const primos = [7, 11, 13, 17, 19, 23];
            const compuestos = [9, 15, 21, 25, 27, 33];
            let primoElegido = primos[rand(0, primos.length-1)];
            let comp1 = compuestos[rand(0, 1)], comp2 = compuestos[rand(2, 3)], comp3 = compuestos[rand(4, 5)];
            let opt5 = shuffleOptions(`El Agente ${primoElegido}`, [`El Agente ${comp1}`, `El Agente ${comp2}`, `El Agente ${comp3}`]);

            questions.push({
                topic: "Primos Secretos", icon: "🤫", color: "from-slate-700 to-slate-900",
                question: `Los números primos son agentes que solo se dividen para 1 y para sí mismos. ¿Quién es el agente primo aquí?`,
                options: opt5.options, correct: opt5.correctIndex, explanation: `¡Agente ${primoElegido} descubierto! Los demás números aparecen en otras tablas de multiplicar.`
            });

            // 6. Conversión
            let opt6 = shuffleOptions("Multiplicar por 10,000", ["Dividir para 100", "Multiplicar por 100", "Dividir para 10,000"]);
            questions.push({
                topic: "La Escalera Gigante", icon: "🪜", color: "from-cyan-500 to-blue-600",
                question: `Estás en el escalón de metros cuadrados (m²) y quieres BAJAR 2 escalones a centímetros cuadrados (cm²). ¿Qué debes hacer con tu número?`,
                options: opt6.options, correct: opt6.correctIndex, explanation: `¡Bajaste rapidísimo! Al bajar multiplicas. Como bajaste 2 escalones y son cuadrados, es x100 y otra vez x100 (10,000).`
            });

            // 7. MCM/MCD
            const pares = [{a:4, b:6, mcm:12, mcd:2}, {a:6, b:8, mcm:24, mcd:2}, {a:3, b:9, mcm:9, mcd:3}, {a:10, b:15, mcm:30, mcd:5}];
            let parElegido = pares[rand(0, pares.length-1)];
            let esMCM = rand(0,1) === 0;
            let preguntaM = esMCM ? `el Mínimo Común Múltiplo (MCM)` : `el Máximo Común Divisor (MCD)`;
            let respM = esMCM ? parElegido.mcm : parElegido.mcd;
            let opt7 = shuffleOptions(`El número ${respM}`, [`El número ${respM + 2}`, `El número ${parElegido.a * parElegido.b}`, `El número ${respM - 1 > 0 ? respM - 1 : 4}`]);

            questions.push({
                topic: "Los Gemelos M", icon: "👯‍♂️", color: "from-rose-500 to-pink-500",
                question: `Misión: Encuentra ${preguntaM} de los números ${parElegido.a} y ${parElegido.b}.`,
                options: opt7.options, correct: opt7.correctIndex, explanation: esMCM ? `El MCM es el múltiplo más pequeño que comparten en sus tablas.` : `El MCD es el número más grande que divide a ambos de forma exacta.`
            });

            // 8. Suma Resta Fracciones
            const sumas = [
                {q: "1/2 + 1/4", ans: "3/4", exp:"Al cortar el 1/2 salen 2/4. Sumas 2/4 + 1/4 = 3/4."},
                {q: "1/2 + 1/3", ans: "5/6", exp:"Buscas el MCM (6). 1/2 es 3/6, y 1/3 es 2/6. Sumas: 5/6."},
                {q: "3/4 - 1/2", ans: "1/4", exp:"Al 3/4 le quitas 2/4 (que es lo mismo que 1/2). Te queda 1/4."},
                {q: "2/3 - 1/3", ans: "1/3", exp:"Como el número de abajo es igual, solo restas los de arriba: 2 - 1 = 1."}
            ];
            let sumaElegida = sumas[rand(0, sumas.length-1)];
            let opt8 = shuffleOptions(`${sumaElegida.ans} de pizza`, ["2/6 de pizza", "4/5 de pizza", "1/6 de pizza"]);

            questions.push({
                topic: "Pizzas Matemáticas", icon: "🍕", color: "from-amber-500 to-orange-500",
                question: `Tienes hambre y debes resolver esto: ¿Cuánto es ${sumaElegida.q}?`,
                options: opt8.options, correct: opt8.correctIndex, explanation: `¡Chef matemático! ${sumaElegida.exp}`
            });

            // 9. Barras
            const temasBarras = ["Helado", "Fútbol", "Perros", "Color Azul", "Robots"];
            let temaBarra = temasBarras[rand(0, temasBarras.length-1)];
            let numBarra = rand(5, 15);
            let opt9 = shuffleOptions(`Hasta el ${numBarra}`, ["Hasta el 1", "Depende del ancho", `Hasta el ${numBarra + 3}`]);

            questions.push({
                topic: "Torre de Bloques", icon: "📊", color: "from-lime-500 to-green-600",
                question: `En una encuesta, ${numBarra} niños votaron por '${temaBarra}'. Al armar tu diagrama de barras, ¿Hasta qué número de altura debe subir?`,
                options: opt9.options, correct: opt9.correctIndex, explanation: `¡Construcción perfecta! La altura de la barra SIEMPRE marca el número exacto de votos (${numBarra}).`
            });
        }

        // ==========================================
        // LÓGICA DEL JUEGO
        // ==========================================
        
        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const levelHeader = document.getElementById('level-header');
        const topicIcon = document.getElementById('topic-icon');
        const topicTitle = document.getElementById('topic-title');
        const scoreDisplay = document.getElementById('score-display');
        const progressContainer = document.getElementById('progress-dots-container');
        const currentQNum = document.getElementById('current-q-num');
        const questionText = document.getElementById('question-text');
        const questionCard = document.getElementById('question-card');
        const optionsContainer = document.getElementById('options-container');
        const feedbackContainer = document.getElementById('feedback-container');
        const nextBtn = document.getElementById('next-btn');

        const sfxCorrect = document.getElementById('sound-correct');
        const sfxWrong = document.getElementById('sound-wrong');
        const sfxWin = document.getElementById('sound-win');

        function initProgressDots() {
            progressContainer.innerHTML = '';
            for(let i=0; i<questions.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot relative';
                dot.id = `dot-${i}`;
                if(i < questions.length - 1) {
                    const line = document.createElement('div');
                    line.className = 'absolute top-1/2 left-full w-full h-1 bg-white/30 -z-10 -translate-y-1/2';
                    line.style.width = 'calc(100% + 20px)';
                    dot.appendChild(line);
                }
                progressContainer.appendChild(dot);
            }
        }

        function playSound(sound) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Sonido silenciado por navegador."));
        }

        function triggerConfetti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#FFD700', '#FF6347', '#4169E1', '#32CD32', '#FF69B4'] });
        }

        function startQuiz() {
            generateQuestions(); // ¡La magia ocurre aquí! Genera nuevas preguntas.
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            quizScreen.classList.add('flex');
            initProgressDots();
            loadQuestion();
        }

        function loadQuestion() {
            canAnswer = true;
            feedbackContainer.classList.add('hidden');
            nextBtn.classList.add('hidden');
            optionsContainer.innerHTML = '';
            questionCard.classList.remove('shake');
            
            const q = questions[currentQuestionIndex];
            
            topicIcon.innerText = q.icon;
            topicTitle.innerText = q.topic;
            currentQNum.innerText = currentQuestionIndex + 1;
            questionText.innerText = q.question;
            levelHeader.className = `p-6 text-white transition-colors duration-500 rounded-b-3xl shadow-md bg-gradient-to-r ${q.color}`;

            for(let i=0; i<questions.length; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.className = 'progress-dot relative';
                if(i < currentQuestionIndex) dot.classList.add('done');
                if(i === currentQuestionIndex) dot.classList.add('active');
            }

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-game option-btn w-full text-left p-5 rounded-2xl bg-white border-4 border-slate-200 hover:border-blue-400 hover:bg-blue-50 font-bold text-slate-700 text-lg md:text-xl flex items-center';
                const colors = ['bg-red-400', 'bg-blue-400', 'bg-green-400', 'bg-yellow-400'];
                btn.innerHTML = `<span class="${colors[index]} text-white w-10 h-10 flex items-center justify-center rounded-xl mr-4 font-black shadow-sm shrink-0 border-2 border-white">${String.fromCharCode(65 + index)}</span><span>${opt}</span>`;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, btnElement) {
            if (!canAnswer) return;
            canAnswer = false;

            const q = questions[currentQuestionIndex];
            const allBtns = optionsContainer.children;
            const isCorrect = selectedIndex === q.correct;

            Array.from(allBtns).forEach((b, idx) => {
                b.disabled = true;
                b.classList.remove('hover:border-blue-400', 'hover:bg-blue-50', 'btn-game');
                
                if (idx === q.correct) {
                    b.classList.add('bg-green-100', 'border-green-500', 'text-green-900');
                    b.children[0].classList.replace('border-white', 'border-green-500');
                } else if (idx === selectedIndex && !isCorrect) {
                    b.classList.add('bg-red-100', 'border-red-500', 'text-red-900');
                    b.children[0].classList.replace('border-white', 'border-red-500');
                } else {
                    b.classList.add('opacity-40');
                }
            });

            feedbackContainer.classList.remove('hidden');
            if (isCorrect) {
                score++;
                scoreDisplay.innerText = score;
                playSound(sfxCorrect);
                triggerConfetti();
                
                const winWords = ["¡Súper!", "¡Excelente!", "¡Genial!", "¡Poder Mental!"];
                const randomWord = winWords[rand(0, winWords.length-1)];
                feedbackContainer.innerHTML = `<div class="text-3xl mb-1">⭐</div><div class="text-2xl mb-1 uppercase tracking-wider">${randomWord}</div><span class="text-base font-semibold block mt-2 text-green-900 bg-white/50 p-2 rounded-xl">${q.explanation}</span>`;
                feedbackContainer.className = 'mt-6 p-5 rounded-2xl text-center font-black border-4 shadow-sm bg-green-400 text-white border-green-500';
            } else {
                playSound(sfxWrong);
                questionCard.classList.add('shake');
                feedbackContainer.innerHTML = `<div class="text-3xl mb-1">😅</div><div class="text-2xl mb-1 uppercase tracking-wider">¡Casi lo tienes!</div><span class="text-base font-semibold block mt-2 text-red-900 bg-white/50 p-2 rounded-xl"><strong>La respuesta correcta era la ${String.fromCharCode(65 + q.correct)}.</strong><br>${q.explanation}</span>`;
                feedbackContainer.className = 'mt-6 p-5 rounded-2xl text-center font-black border-4 shadow-sm bg-red-400 text-white border-red-500';
            }

            nextBtn.classList.remove('hidden');
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerHTML = '¡Ver mi Trofeo! <i class="fas fa-trophy ml-2"></i>';
                nextBtn.classList.replace('bg-blue-500', 'bg-yellow-500');
                nextBtn.classList.replace('hover:bg-blue-400', 'hover:bg-yellow-400');
                nextBtn.classList.add('text-yellow-900');
                nextBtn.classList.remove('text-white');
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizScreen.classList.add('hidden');
            quizScreen.classList.remove('flex');
            resultScreen.classList.remove('hidden');
            
            playSound(sfxWin);
            triggerConfetti();
            setTimeout(triggerConfetti, 1000);
            
            document.getElementById('final-score').innerText = score;
            const messageEl = document.getElementById('result-message');
            const iconEl = document.getElementById('result-icon');

            if (score === 9) {
                iconEl.innerText = '👑';
                messageEl.innerText = "¡ERES UNA LEYENDA MATEMÁTICA! Tu cerebro es nivel Einstein.";
            } else if (score >= 7) {
                iconEl.innerText = '🚀';
                messageEl.innerText = "¡SÚPER BIEN! Estás listísimo para destruir ese examen.";
            } else if (score >= 5) {
                iconEl.innerText = '🛡️';
                messageEl.innerText = "¡BUEN TRABAJO! Ya casi dominas todos los poderes matemáticos.";
            } else {
                iconEl.innerText = '🔋';
                messageEl.innerText = "¡HAY QUE RECARGAR ENERGÍA! Juega otra vez para volverte más fuerte.";
            }
        }

        function resetQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            
            nextBtn.innerHTML = 'Siguiente Nivel <i class="fas fa-forward ml-2"></i>';
            nextBtn.className = 'hidden btn-game w-full md:w-2/3 bg-blue-500 hover:bg-blue-400 text-white font-black py-4 px-8 rounded-full text-xl tracking-wider uppercase';

            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
